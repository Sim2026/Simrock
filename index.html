<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Simrock</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f1e6;
  display: flex;
  flex-direction: column;
  align-items: center;
}


h1 {
  margin-top: 30px;
  font-size: 42px;
}


h2 {
  margin-top: -10px;
  font-weight: normal;
  font-size: 18px;
}


/* Buch */

.book {

  margin-top: 30px;

  width: 1200px;
  height: 650px;

  background: #fffdf7;

  border-radius: 10px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.2);

  display: flex;

  position: relative;

  overflow: hidden;

}


/* Falz */

.spine {

  position: absolute;
  left: 50%;
  top: 10px;
  bottom: 10px;

  width: 2px;

  background: rgba(0,0,0,0.12);

}


/* Seiten */

.page {

  width: 50%;

  height: 100%;

  padding: 40px;

  padding-bottom: 100px;

  box-sizing: border-box;

  font-size: 18px;

  line-height: 1.6;

  overflow: hidden;

}


.left {

  border-right: 1px solid rgba(0,0,0,0.05);

}



/* Buttons */

button {

  position: absolute;

  bottom: 25px;

  border: none;

  background: transparent;

  font-family: Georgia, serif;

  font-size: 18px;

  cursor: pointer;

  color: #444;

}


button:hover {

  text-decoration: underline;

}


#back {

  left: 25px;

}


#next {

  right: 25px;

}



/* Link */

.link {

  margin-top: 25px;

  font-size: 20px;

  color: #222;

  text-decoration: none;

}


.link:hover {

  text-decoration: underline;

}


</style>

</head>


<body>


<h1>Simrock</h1>

<h2>eine kleine Auswahl</h2>



<div class="book">


<div class="spine"></div>


<div class="page left" id="leftPage"></div>


<div class="page" id="rightPage"></div>



<button id="back" onclick="backPage()">
← Zurück
</button>


<button id="next" onclick="nextPage()">
Weiter →
</button>


</div>




<a class="link" href="video.html">
Rheinsagen
</a>





<script>


/*
=====================================
HIER WERDEN DIE BUCHSEITEN EINGETRAGEN

links = linke Buchseite
rechts = rechte Buchseite
=====================================
*/


const pages = [


{

left: `

<strong>1.</strong><br>
Rathe, was ich hab vernommen:<br>
Es sind achtzehn kleine Gesellen zur Welt gekommen,<br>
Von Angesicht gar säuberlich,<br>
Keiner doch dem Andern glich.<br>
All ohne Fehler und Gebrechen,<br>
Nur konnte Keiner Ein Wort sprechen;<br>
Und damit man sie sollte verstehn,<br>
Hatten sie fünf Dollmetscher mit sich gehn.<br>
Das waren hochgelehrte Leut:<br>
Der erst erstaunt, reißts Maul auf weit,<br>
Der zweite wie ein Kindlein schreit,<br>
Der dritte wie ein Mäuslein pfiff,<br>
Der vierte wie ein Fuhrmann rief,<br>
Der fünft gar wie ein Uhu thut:<br>

`,

right: `

Das waren ihre Künste gut,<br>
Damit erhoben sie ein Geschrei,<br>
Füllt noch die Welt, ist nicht vorbei. <br><br>

<strong>41.</strong><br>
Ihr lieben Leut,<br>
Was das bedeutt:<br>
Hat sieben Häut,<br>
Beißt alle Leut? <br><br>

<strong>51.</strong> <br>
Die Sonne kochts, die Hand brichts,<br>
Der Fuß tritts, der Mund genießts.<br>

`,
},
  
{
left: `

<strong>52.</strong><br>
Es geht und geht schon immer fort<br>
Und kommt doch keinen Schritt vom Ort.<br><br>

<strong>60.</strong><br>
Der Eine hats,<br>
Der Andere hats gehabt,<br> 
Der dritte hätt es gern.<br><br>

<strong>80.</strong><br>
Es steht auf dem Rain,<br>
Hat den Busen voll Stein,<br>
Hat ein rothes Mäntelchen auf<br>
Und ein schwarzes Käppchen drauf.<br><br>
`,
right: `
<strong>94.</strong><br>
Es schrieh ein Mann an eine Wand:<br>
Zehn Finger hab ich an jeder Hand,<br>
Fünfundzwanzig an Händen und Füßen,<br>
Wer das nicht räth, der muß es büßen.<br><br>

<strong>110.</strong><br>
Zwei Fenster sind es, die man trägt,<br>
Ein Jedes sich von selbst bewegt;<br>
Man guckt durch sie nicht in das Haus,<br>
Doch guckt man desto mehr hinaus.<br><br>

<strong>311.</strong><br>
Wie schreibt man eine lebendige Mausefalle mit fünf<br> 
Buchstaben?<br><br>
`,

},



{

left: `

<strong>1.</strong><br>
Das ABC.<br> 
(Die fünf Dolmetscher kannst du bestimmt den fünf Vokalen zuordnen. 
Kannst du dir auch erklären, warum hier von nur 18 kleinen Gesellen gesprochen wird?)<br><br>

<strong>41.</strong><br>
Die Zwiebel.<br><br>

<strong>51.</strong><br>
(Der Wein.) [bzw. siehe Exponat X.Y.]<br><br>

<strong>52.</strong><br>
(Die Uhr.) [bzw. siehe Exponat X.Yb.]<br><br>
`,

right: `

<strong>60.</strong><br>
Das Geld.<br><br>

<strong>80.</strong><br>
Die Hambutte.<br> 
[regionale Namensvariation von Hagebutte]<br><br>

<strong>94.</strong><br>
Wird durch veränderte Interpunktion verständlich:<br>
Zehn Finger hab ich: an jeder Hand fünf, und zwanzig an Händen und Füßen.<br><br>

<strong>110.</strong><br>
Die Augen.<br><br>

<strong>311.</strong><br>
Katze.<br><br>
`

}


];





let current = 0;



function showPage(){


document.getElementById("leftPage").innerHTML =
pages[current].left;


document.getElementById("rightPage").innerHTML =
pages[current].right;



// Zurück-Button auf der ersten Seite verstecken

if(current === 0){

document.getElementById("back").style.display = "none";

}
else {

document.getElementById("back").style.display = "block";

}



// Text des Weiter-Buttons ändern

let nextButton = document.getElementById("next");


if(current === pages.length - 2){

nextButton.innerHTML = "Lösungen →";

}
else {

nextButton.innerHTML = "Weiter →";

}


}




function nextPage(){

if(current < pages.length - 1){

current++;

showPage();

}

}




function backPage(){

if(current > 0){

current--;

showPage();

}

}



showPage();


</script>


</body>
</html>
