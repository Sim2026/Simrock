```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Simrock</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f1e6;
  display: flex;
  flex-direction: column;
  align-items: center;
}


/* Überschrift */

h1 {
  margin-top: 30px;
  font-size: 42px;
}

h2 {
  margin-top: -10px;
  font-weight: normal;
  font-size: 18px;
}


/* Buch */

.book {
  margin-top: 30px;
  width: 1000px;
  height: 600px;
  background: #fffdf7;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: flex;
  position: relative;
  overflow: hidden;
}


/* Buchfalz */

.spine {
  position: absolute;
  left: 50%;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: rgba(0,0,0,0.1);
}


/* Seiten */

.page {
  width: 50%;
  padding: 40px;
  box-sizing: border-box;
  font-size: 18px;
  line-height: 1.6;
}


.left {
  border-right: 1px solid rgba(0,0,0,0.05);
}


/* Buttons */

.next {
  position: absolute;
  right: 25px;
  bottom: 20px;
  border: none;
  background: transparent;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #444;
}


.prev {
  position: absolute;
  left: 25px;
  bottom: 20px;
  border: none;
  background: transparent;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #444;
}


.next:hover,
.prev:hover {
  text-decoration: underline;
}


/* Link unten */

.link {
  margin-top: 25px;
  font-size: 20px;
  cursor: pointer;
  color: #222;
  text-decoration: none;
}


.link:hover {
  text-decoration: underline;
}


</style>

</head>


<body>


<h1>Simrock</h1>
<h2>eine kleine Auswahl</h2>



<div class="book">

  <div class="spine"></div>


  <div class="page left" id="leftPage">
  </div>


  <div class="page right" id="rightPage">
  </div>


  <button class="prev" onclick="prevPage()">
    ← Zurück
  </button>


  <button class="next" onclick="nextPage()">
    Weiter →
  </button>


</div>



<a class="link" href="video.html">
Rheinsagen
</a>



<script>


const pages = [


{
left: `
<strong>Rätsel 1</strong><br><br>

Rathe, was ich hab vernommen:<br>
Es sind achtzehn kleine Gesellen zur Welt gekommen,<br>
Von Angesicht gar säuberlich,<br>
keiner doch dem Andern glich.<br>
All ohne Fehler und Gebrechen,<br>
Nur konnte Keiner Ein Wort sprechen;<br>
Und damit man sie sollte verstehn,
`,

right: `
<strong>Rätsel 1 (Fortsetzung)</strong><br><br>

Hatten sie fünf Dollmetscher mit sich gehn.<br>
Das waren hochgelehrte Leut:<br>
Der erst erstaunt, reißts Maul auf weit,<br>
Der zweite wie ein Kindlein schreit,<br>
Der dritte wie ein Mäuslein pfiff,<br>
Der vierte wie ein Fuhrmann rief,<br>
Der fünft gar wie ein Uhu thut:<br>
Das waren ihre Künste gut,<br>
Damit erhoben sie ein Geschrei,<br>
Füllt noch die Welt, ist nicht vorbei.
`
},



{
left: `
<strong>Rätsel 2</strong><br><br>

Hier kommt der Text des zweiten Rätsels.
<br><br>

Der Text kann beliebig erweitert werden.
`,

right: `
<strong>Rätsel 2 (Fortsetzung)</strong><br><br>

Hier geht das zweite Rätsel weiter.
`
},



{
left: `
<strong>Rätsel 3</strong><br><br>

Hier kommt der Text des dritten Rätsels.
`,

right: `
<strong>Lösungen</strong><br><br>

Lösung 1:<br>
Antwort auf Rätsel 1.<br><br>

Lösung 2:<br>
Antwort auf Rätsel 2.
`
}


];



let currentPage = 0;



function showPage(){

document.getElementById("leftPage").innerHTML =
pages[currentPage].left;


document.getElementById("rightPage").innerHTML =
pages[currentPage].right;

}



function nextPage(){

if(currentPage < pages.length - 1){

currentPage++;
showPage();

}

}



function prevPage(){

if(currentPage > 0){

currentPage--;
showPage();

}

}



showPage();


</script>



</body>
</html>
```
