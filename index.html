<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Simrock</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f1e6;
  display: flex;
  flex-direction: column;
  align-items: center;
}


h1 {
  margin-top: 30px;
  font-size: 42px;
}


h2 {
  margin-top: -10px;
  font-weight: normal;
  font-size: 18px;
}



/* Buch */

.book {
  margin-top: 30px;
  width: 1000px;
  height: 600px;
  background: #fffdf7;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: flex;
  position: relative;
  overflow: hidden;
}



/* Falz */

.spine {
  position: absolute;
  left: 50%;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: rgba(0,0,0,0.12);
}



/* Seiten */

.page {

  width: 50%;
  height: 100%;

  padding: 40px;
  padding-bottom: 90px;

  box-sizing: border-box;

  font-size: 18px;
  line-height: 1.6;

  overflow: hidden;
}



.left {
  border-right: 1px solid rgba(0,0,0,0.05);
}




/* Navigation */

button {

  position: absolute;
  bottom: 20px;

  border: none;
  background: transparent;

  font-family: Georgia, serif;
  font-size: 18px;

  cursor: pointer;
  color: #444;

}


button:hover {
  text-decoration: underline;
}


#back {
  left: 25px;
}


#next {
  right: 25px;
}




.link {

  margin-top: 25px;

  font-size: 20px;

  color: #222;

  text-decoration: none;

}


.link:hover {
  text-decoration: underline;
}


</style>

</head>



<body>


<h1>Simrock</h1>
<h2>eine kleine Auswahl</h2>




<div class="book">


<div class="spine"></div>


<div class="page left" id="leftPage"></div>

<div class="page" id="rightPage"></div>


<button id="back" onclick="previousPage()">
← Zurück
</button>


<button id="next" onclick="nextPage()">
Weiter →
</button>


</div>




<a class="link" href="video.html">
Rheinsagen
</a>





<script>


/*
====================================
HIER NUR DIE TEXTE ÄNDERN
====================================
*/


const raetsel = [

`
<strong>Rätsel 1</strong><br><br>

Rathe, was ich hab vernommen:<br>
Es sind achtzehn kleine Gesellen zur Welt gekommen,<br>
Von Angesicht gar säuberlich,<br>
keiner doch dem Andern glich.<br>
All ohne Fehler und Gebrechen,<br>
Nur konnte Keiner Ein Wort sprechen;<br>
Und damit man sie sollte verstehn,<br>
Hatten sie fünf Dollmetscher mit sich gehn.<br>

Das waren hochgelehrte Leut:<br>
Der erst erstaunt, reißts Maul auf weit,<br>
Der zweite wie ein Kindlein schreit,<br>
Der dritte wie ein Mäuslein pfiff,<br>
Der vierte wie ein Fuhrmann rief,<br>
Der fünft gar wie ein Uhu thut:<br>
Das waren ihre Künste gut,<br>
Damit erhoben sie ein Geschrei,<br>
Füllt noch die Welt, ist nicht vorbei.
`,


`
<strong>Rätsel 2</strong><br><br>

Hier kommt der Text des zweiten Rätsels.
<br><br>

Du kannst hier später weitere Rätsel einfügen.
`,


`
<strong>Rätsel 3</strong><br><br>

Hier kommt der Text des dritten Rätsels.
`


];




let bookPages = [];

let currentPage = 0;



function splitText(){


let tester = document.createElement("div");


tester.className = "page";

tester.style.position = "absolute";
tester.style.visibility = "hidden";

document.body.appendChild(tester);



raetsel.forEach(text => {


let words = text.split(" ");

let left = "";
let right = "";


for(let word of words){

tester.innerHTML = left + word + " ";

if(tester.scrollHeight <= tester.clientHeight){

left += word + " ";

}

else {

right += word + " ";

}

}



bookPages.push({

left:left,
right:right

});


});



document.body.removeChild(tester);


}





function showPage(){


document.getElementById("leftPage").innerHTML =
bookPages[currentPage]?.left || "";


document.getElementById("rightPage").innerHTML =
bookPages[currentPage]?.right || "";


}





function nextPage(){


if(currentPage < bookPages.length - 1){

currentPage++;

showPage();

}

}




function previousPage(){


if(currentPage > 0){

currentPage--;

showPage();

}

}





splitText();

showPage();



</script>



</body>
</html>
