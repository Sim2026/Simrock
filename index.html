<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Simrock</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f1e6;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Überschrift */
h1 {
  margin-top: 30px;
  font-size: 42px;
}

h2 {
  margin-top: -10px;
  font-weight: normal;
  font-size: 18px;
}


/* Buch */
.book {
  margin-top: 30px;
  width: 800px;
  height: 500px;
  background: #fffdf7;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: flex;
  position: relative;
  overflow: hidden;
}


/* Buchfalz */
.spine {
  position: absolute;
  left: 50%;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: rgba(0,0,0,0.1);
}


/* Seite */
.page {
  width: 100%;
  padding: 35px;
  box-sizing: border-box;
  font-size: 18px;
  line-height: 1.6;
}


/* Weiter Button */
.next {
  position: absolute;
  right: 20px;
  bottom: 15px;
  border: none;
  background: transparent;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #444;
}

.next:hover {
  text-decoration: underline;
}
.prev {
  position: absolute;
  left: 20px;
  bottom: 15px;
  border: none;
  background: transparent;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #444;
}

.prev:hover {
  text-decoration: underline;
}

/* Link unten */
.link {
  margin-top: 25px;
  font-size: 20px;
  cursor: pointer;
  color: #222;
  text-decoration: none;
}

.link:hover {
  text-decoration: underline;
}

</style>

</head>


<body>


<h1>Simrock</h1>
<h2>eine kleine Auswahl</h2>


<div class="book">

  <div class="spine"></div>

  <div class="page" id="page">
  </div>

  <button class="prev" onclick="prevPage()">
    ← Zurück
  </button>

  <button class="next" onclick="nextPage()">
    Weiter →
  </button>

</div>

<a class="link" href="video.html">
Rheinsagen
</a>



<script>


const pages = [


`
<strong>Rätsel 1</strong><br><br>

Rathe, was ich hab vernommen:<br>
Es sind achtzehn kleine Gesellen zur Welt gekommen,<br>
Von Angesicht gar säuberlich,<br>
keiner doch dem Andern glich.<br>
All ohne Fehler und Gebrechen,<br>
Nur konnte Keiner Ein Wort sprechen;<br>
Und damit man sie sollte verstehn,<br>
Hatten sie fünf Dollmetscher mit sich gehn.
`,


`
<strong>Rätsel 1 (Fortsetzung)</strong><br><br>

Das waren hochgelehrte Leut:<br>
Der erst erstaunt, reißts Maul auf weit,<br>
Der zweite wie ein Kindlein schreit,<br>
Der dritte wie ein Mäuslein pfiff,<br>
Der vierte wie ein Fuhrmann rief,<br>
Der fünft gar wie ein Uhu thut:<br>
Das waren ihre Künste gut,<br>
Damit erhoben sie ein Geschrei,<br>
Füllt noch die Welt, ist nicht vorbei.
`,


`
<strong>Rätsel 2</strong><br><br>

Hier kommt der Text des zweiten Rätsels.
<br><br>

Noch kannst du weitere Rätsel hier ergänzen.
`,


`
<strong>Rätsel 3</strong><br><br>

Hier kommt der Text des dritten Rätsels.
`,


`
<strong>Lösungen</strong><br><br>

Lösung 1:<br>
Hier steht die Antwort auf Rätsel 1.<br><br>

Lösung 2:<br>
Hier steht die Antwort auf Rätsel 2.<br><br>

Lösung 3:<br>
Hier steht die Antwort auf Rätsel 3.
`

];


let currentPage = 0;


function showPage(){

  document.getElementById("page").innerHTML = pages[currentPage];

}


function nextPage(){

  if(currentPage < pages.length - 1){

    currentPage++;
    showPage();

  }

}


showPage();


</script>


</body>
</html>
```
